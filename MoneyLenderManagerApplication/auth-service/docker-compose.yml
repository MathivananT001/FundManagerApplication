version: "3.8"

services:
  auth-service:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moneylender
      MYSQL_USER: mlm_admin
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - ../infrastructure/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ../infrastructure/migrations/seed_data.sql:/docker-entrypoint-initdb.d/002_seed.sql
